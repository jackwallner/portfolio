<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Jack Wallner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e6e7ee;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(60vw 60vw at 80% -10%, rgba(124, 140, 255, 0.18), transparent 60%),
                radial-gradient(50vw 50vw at -10% 30%, rgba(167, 139, 250, 0.14), transparent 60%);
            z-index: -1;
        }
        .card { max-width: 38rem; text-align: center; }
        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #7c8cff;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
            background: linear-gradient(120deg, #c4cbff 0%, #a78bfa 50%, #7c8cff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p { color: #9ca0b3; margin-bottom: 2rem; font-size: 1.05rem; }
        a {
            display: inline-flex;
            gap: 0.5rem;
            align-items: center;
            padding: 0.75rem 1.25rem;
            background: #7c8cff;
            color: #0a0a0f;
            text-decoration: none;
            border-radius: 0.6rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        a:hover {
            background: #94a2ff;
            box-shadow: 0 8px 24px rgba(124, 140, 255, 0.35);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">// 404 — not found</div>
        <h1>This page wandered off.</h1>
        <p>The link you followed doesn't exist on this site. Let's get you home.</p>
        <a href="./">← Back to portfolio</a>
    </div>
</body>
</html>
