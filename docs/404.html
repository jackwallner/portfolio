<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not found — Jack Wallner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/portfolio/style.css">
    <style>
        .stop-press {
            min-height: calc(100vh - 4rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 4rem 0;
        }
        .stop-press .stamp-big {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--paper);
            background: var(--mark);
            padding: 0.4rem 0.8rem;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .stop-press h1 {
            font-family: 'EB Garamond', serif;
            font-size: clamp(3rem, 9vw, 6rem);
            line-height: 0.95;
            letter-spacing: -0.025em;
            font-weight: 500;
            margin-bottom: 1rem;
        }
        .stop-press h1 em { font-style: italic; color: var(--ink-2); font-weight: 400; }
        .stop-press p {
            font-size: 1.2rem;
            max-width: 32em;
            margin-bottom: 1.5rem;
        }
        .stop-press .links {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.85rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .stop-press .links a {
            text-decoration: none;
            border-bottom: 1px solid var(--ink);
            padding-bottom: 1px;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="container topbar-inner">
            <div class="left"><span>404</span> <span class="pipe">·</span> <span>Page not found</span></div>
            <div class="right"><a href="/portfolio/">← Back to portfolio</a></div>
        </div>
    </div>
    <main class="container">
        <div class="stop-press">
            <span class="stamp-big">Stop the presses</span>
            <h1>404 <em>— that page isn't here.</em></h1>
            <p>Either it was never published, or it's been moved. The selected work lives <a href="/portfolio/">on the front page</a>.</p>
            <div class="links">
                <a href="/portfolio/">Front page</a>
                <a href="/portfolio/#work">Selected work</a>
                <a href="https://github.com/jackwallner" target="_blank" rel="noopener">GitHub ↗</a>
            </div>
        </div>
    </main>
</body>
</html>
