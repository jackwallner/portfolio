<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not found — Jack Wallner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css">
    <style>
        .not-found {
            min-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 0;
        }
        .not-found h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }
        .not-found p {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 480px;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .not-found .links {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.78rem;
            display: flex;
            gap: 1.25rem;
            flex-wrap: wrap;
        }
        .not-found .links a {
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 1px;
        }
        .not-found .links a:hover {
            color: var(--text);
            border-bottom-color: var(--text);
        }
    </style>
</head>
<body>
    <header class="site-header container">
        <a href="/portfolio/" class="nav-back">← Back to portfolio</a>
    </header>
    <main class="container not-found">
        <h1>404</h1>
        <p>That page isn't here. Either it was never published, or it's been moved. The selected work lives <a href="/portfolio/">on the front page</a>.</p>
        <div class="links">
            <a href="/portfolio/">Front page</a>
            <a href="/portfolio/repos.html">All repositories</a>
            <a href="https://github.com/jackwallner" target="_blank" rel="noopener">GitHub ↗</a>
        </div>
    </main>
</body>
</html>
